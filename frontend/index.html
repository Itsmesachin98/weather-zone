<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Weather App</title>
        <link rel="icon" type="image/png" href="images/favicon.png" />
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <section id="app-interface">
            <div class="left-pane">
                <div class="search-bar">
                    <input
                        type="text"
                        id="city-name"
                        placeholder="Search City"
                    />
                    <div class="btn-container">
                        <button class="btn" id="search-btn">
                            <img
                                class="search"
                                src="images/search.png"
                                alt=""
                            />
                        </button>
                    </div>
                </div>

                <div class="weather-info">
                    <div class="weather-icon-container">
                        <img class="weather-icon" src="images/error.png" alt="">
                    </div>
                    <div>
                        <span class="temp"></span>
                    </div>
                    <div>
                        <span id="sky-status" class="sky-sta"></span>
                    </div>

                    <hr />

                    <div>
                        <span class="date"></span>
                    </div>
                    <div>
                        <span class="day-and-time"></span>
                    </div>
                    <div>
                        <span class="day-status"></span>
                    </div>

                    <div class="wr-location">
                        <span id="location"></span>
                    </div>
                </div>
            </div>

            <div class="right-pane">
                <header class="header">
                    <span>Today</span>
                </header>
                <div class="weather-details">
                    <div class="weather-details-card">
                        <span class="head-text">Wind Speed</span>
                        <span id="wind-speed" class="main-text"></span>
                    </div>
                    <div class="weather-details-card">
                        <span class="head-text">Humidity</span>
                        <span id="humidity" class="main-text"></span>
                    </div>
                    <div class="weather-details-card">
                        <span class="head-text">Real Feel</span>
                        <span id="real-feel" class="main-text"></span>
                    </div>
                    <div class="weather-details-card">
                        <span class="head-text">AQI</span>
                        <span id="aqi" class="main-text"></span>
                    </div>
                    <div class="weather-details-card">
                        <span class="head-text">Pressure</span>
                        <span id="pressure" class="main-text"></span>
                    </div>
                    <div class="weather-details-card">
                        <span class="head-text">Visibility</span>
                        <span id="visibility" class="main-text"></span>
                    </div>
                    <div class="weather-details-card">
                        <span class="head-text">Temperature</span>
                        <div class="wrapper">
                            <span class="head-text">
                                Min
                                <span id="min-temp" class="main-text"
                                    ></span
                                ></span>
                            </span>
                            <span class="head-text">
                                Max
                                <span id="max-temp" class="main-text"
                                    ></span
                                ></span>
                            </span>
                        </div>
                    </div>
                    <div class="weather-details-card">
                        <span class="head-text">Sun</span>
                        <div class="wrapper">
                            <span class="head-text"
                                >Rise
                                <span id="sunrise-time" class="main-text"
                                    ></span
                                ></span
                            >
                            <span class="head-text"
                                >Set
                                <span id="sunset-time" class="main-text"
                                    ></span
                                ></span
                            >
                        </div>
                    </div>
                    <div class="weather-details-card">
                        <span class="head-text">Sea Level</span>
                        <span id="sea-level" class="main-text"></span>
                    </div>
                </div>
                <footer class="footer">
                    <span
                        >All Data Provided By -
                        <a href="https://openweathermap.org/" target="_blank"
                            >OpenWeather</a
                        ></span
                    >

                    <span
                        >Developed By -
                        <a
                            href="https://github.com/Itsmesachin98"
                            target="_blank"
                            >Sachin Mehra</a
                        ></span
                    >
                </footer>
            </div>
        </section>
        <script src="script.js"></script>
    </body>
</html>

<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Weather App</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <section id="interface">
            <div class="left-pane">
                <div class="search-bar">
                    <input
                        type="text"
                        id="city-name"
                        placeholder="Search City"
                    />
                    <div class="btn-container">
                        <button class="btn" id="search-btn">
                            <img
                                class="search"
                                src="images/search.png"
                                alt=""
                            />
                        </button>
                    </div>
                </div>

                <div class="weather-info">
                    <div class="weather-img-container">
                        <img
                            class="weather-img"
                            src="https://openweathermap.org/img/wn/01d@2x.png"
                            alt=""
                        />
                    </div>
                    <div>
                        <span class="temp"></span>
                    </div>
                    <div>
                        <span id="sky-status" class="sky-sta"></span>
                    </div>

                    <hr />

                    <div>
                        <span class="date">27 Mar 2025</span>
                    </div>
                    <div>
                        <span class="day-and-time">Thrusday, 8:10 PM</span>
                    </div>
                    <div>
                        <span class="day-status">Night</span>
                    </div>

                    <div>
                        <span id="location">Godda, India</span>
                    </div>
                </div>
            </div>

            <div class="right-pane">
                <header class="header">
                    <span>Today</span>
                </header>
                <div class="weather-details">
                    <div class="weather-details-card">
                        <span class="head-text">Wind Speed</span>
                        <span id="wind-speed" class="main-text"></span>
                    </div>
                    <div class="weather-details-card">
                        <span class="head-text">Humidity</span>
                        <span id="humidity" class="main-text"></span>
                    </div>
                    <div class="weather-details-card">
                        <span class="head-text">Real Feel</span>
                        <span id="real-feel" class="main-text"></span>
                    </div>
                    <div class="weather-details-card">
                        <span class="head-text">AQI</span>
                        <span id="aqi" class="main-text"></span>
                    </div>
                    <div class="weather-details-card">
                        <span class="head-text">Pressure</span>
                        <span id="pressure" class="main-text"></span>
                    </div>
                    <div class="weather-details-card">
                        <span class="head-text">Visibility</span>
                        <span id="visibility" class="main-text"></span>
                    </div>
                    <div class="weather-details-card">
                        <span class="head-text">Temperature</span>
                        <span id="temp-min" class="main-text"></span>
                        <span id="temp-max" class="main-text"></span>
                    </div>
                    <div class="weather-details-card">
                        <span class="head-text">Sun</span>
                        <span id="sun-rise-set" class="main-text"></span>
                    </div>
                    <div class="weather-details-card">
                        <span class="head-text">Sea Level</span>
                        <span id="sea-level" class="main-text"></span>
                    </div>
                </div>
                <footer class="footer">
                    <span
                        >All Data Provided By -
                        <a href="https://www.accuweather.com/" target="_blank"
                            >AccuWeather</a
                        ></span
                    >

                    <span
                        >Developed By -
                        <a
                            href="https://github.com/Itsmesachin98"
                            target="_blank"
                            >Sachin Mehra</a
                        ></span
                    >
                </footer>
            </div>
        </section>
        <script src="script.js"></script>
    </body>
</html>
